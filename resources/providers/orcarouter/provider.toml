name = "OrcaRouter"
env = ["ORCAROUTER_API_KEY"]
npm = "@ai-sdk/openai-compatible"
# Raw HTTP reasoning controls (sources accessed 2026-06-25):
# Chat POST `/v1/chat/completions` accepts `reasoning_effort = low|medium|high`
# plus model-specific minimal|max and translates it to the selected upstream.
# Messages POST `/v1/messages` accepts `thinking.type = enabled|disabled|adaptive`
# and `thinking.budget_tokens`. Gemini native POST
# `/v1beta/models/{model}:generateContent` passes through
# `generationConfig.thinkingConfig` (including `includeThoughts`, thinking
# level, or budget). DeepSeek reasoner's Chat effort is documented as a no-op.
# https://docs.orcarouter.ai/advanced/reasoning
# https://docs.orcarouter.ai/api-reference/messages/create-a-message
# https://docs.orcarouter.ai/native-formats/gemini
api = "https://api.orcarouter.ai/v1"
doc = "https://docs.orcarouter.ai"
