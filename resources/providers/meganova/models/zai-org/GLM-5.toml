# MegaNova identifies GLM-5 as a reasoning model, but its raw Chat request
# schema documents no field or values that enable and disable reasoning.
# https://docs.meganova.ai/inference-models/text-generation.md (accessed 2026-06-25)
name = "GLM-5"
family = "glm"
release_date = "2026-02-11"
last_updated = "2026-02-11"
attachment = false
reasoning = true
reasoning_options = [{ type = "toggle" }]
temperature = true
tool_call = true
open_weights = true

[interleaved]
field = "reasoning_content"

[cost]
input = 0.80
output = 2.56

[limit]
context = 202_752
output = 131_072

[modalities]
input = ["text"]
output = ["text"]
