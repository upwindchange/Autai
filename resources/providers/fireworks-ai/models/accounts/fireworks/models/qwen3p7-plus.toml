name = "Qwen 3.7 Plus"
# Fireworks documents effort low|medium|high and thinking.budget_tokens >= 1024;
# toggle semantics and configured min 1 are undocumented.
# https://docs.fireworks.ai/guides/reasoning (accessed 2026-06-25)
family = "qwen"
release_date = "2026-06-12"
last_updated = "2026-06-12"
attachment = true
reasoning = true
temperature = true
tool_call = true
open_weights = false

[[reasoning_options]]
type = "toggle"

[[reasoning_options]]
type = "effort"
values = ["low", "medium", "high"]

[[reasoning_options]]
type = "budget_tokens"
min = 1

[cost]
cache_read = 0.08
input = 0.40
output = 1.60

[limit]
context = 262_144
output = 65_536

[modalities]
input = ["text", "image"]
output = ["text"]
