base_model = "deepseek/deepseek-v4-pro"
# Fireworks' published schema does not document this model's toggle or "max"
# effort mapping. https://docs.fireworks.ai/guides/reasoning (accessed 2026-06-25)

[[reasoning_options]]
type = "toggle"

[[reasoning_options]]
type = "effort"
values = ["high", "max"]

[interleaved]
field = "reasoning_content"

[cost]
input = 1.74
output = 3.48
cache_read = 0.145
