name = "DigitalOcean"
env = ["DIGITALOCEAN_ACCESS_TOKEN"]
npm = "@ai-sdk/openai-compatible"
# Raw HTTP routes are POST `/v1/chat/completions`, `/v1/responses`, and
# `/v1/messages`. Chat/Responses accept OpenAI `reasoning_effort` or
# `reasoning.effort = none|low|medium|high|max`; `reasoning.max_tokens` is an
# Anthropic reasoning budget, otherwise derived as 20/50/80/95 percent of
# `max_completion_tokens` for low/medium/high/max.
# https://docs.digitalocean.com/products/inference/how-to/si-endpoints/index.html.md (accessed 2026-06-25)
# https://docs.digitalocean.com/products/inference/how-to/use-reasoning/index.html.md (accessed 2026-06-25)
api = "https://inference.do-ai.run/v1"
doc = "https://docs.digitalocean.com/products/gradient-ai-platform/details/models/"
