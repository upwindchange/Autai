name = "GPT-5.4"
# Serverless supports only POST `/v1/responses`; use
# `reasoning.effort = none|low|medium|high|xhigh`.
# https://docs.digitalocean.com/products/inference/details/models/index.html.md (accessed 2026-06-25)
# https://developers.openai.com/api/docs/models/gpt-5.4 (accessed 2026-06-25)
family = "gpt"
release_date = "2026-03-05"
last_updated = "2026-03-05"
attachment = true
reasoning = true
reasoning_options = [{ type = "effort", values = ["none", "low", "medium", "high", "xhigh"] }]
temperature = false
tool_call = true
structured_output = true
knowledge = "2025-08-31"
open_weights = false

[cost]
input = 2.50
output = 15.00
cache_read = 0.25

[limit]
context = 1_000_000
output = 128_000

[modalities]
input = ["text", "image", "pdf"]
output = ["text"]
