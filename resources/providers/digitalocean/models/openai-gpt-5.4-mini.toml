name = "GPT-5.4 mini"
# Serverless supports only POST `/v1/responses`; use
# `reasoning.effort = none|low|medium|high|xhigh`.
# https://docs.digitalocean.com/products/inference/details/models/index.html.md (accessed 2026-06-25)
# https://developers.openai.com/api/docs/models/gpt-5.4-mini (accessed 2026-06-25)
family = "gpt-mini"
release_date = "2026-03-17"
last_updated = "2026-03-17"
attachment = true
reasoning = true
reasoning_options = [{ type = "effort", values = ["none", "low", "medium", "high", "xhigh"] }]
temperature = false
tool_call = true
structured_output = true
knowledge = "2025-08-31"
open_weights = false

[cost]
input = 0.75
output = 4.50
cache_read = 0.075

[limit]
context = 400_000
output = 128_000

[modalities]
input = ["text", "image"]
output = ["text"]
