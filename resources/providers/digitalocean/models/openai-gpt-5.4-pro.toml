name = "GPT-5.4 pro"
# Serverless supports only POST `/v1/responses`; this model restricts
# `reasoning.effort` to medium|high|xhigh.
# https://docs.digitalocean.com/products/inference/details/models/index.html.md (accessed 2026-06-25)
# https://developers.openai.com/api/docs/models/gpt-5.4-pro (accessed 2026-06-25)
family = "gpt-pro"
release_date = "2026-03-05"
last_updated = "2026-03-05"
attachment = true
reasoning = true
reasoning_options = [{ type = "effort", values = ["medium", "high", "xhigh"] }]
temperature = false
tool_call = true
knowledge = "2025-08-31"
open_weights = false

[cost]
input = 30.00
output = 180.00

[limit]
context = 400_000
output = 128_000

[modalities]
input = ["text", "image"]
output = ["text"]
