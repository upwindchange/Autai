name = "GPT-5.5"
# Serverless supports only POST `/v1/responses`; use
# `reasoning.effort = none|low|medium|high|xhigh`.
# https://docs.digitalocean.com/products/inference/details/models/index.html.md (accessed 2026-06-25)
# https://developers.openai.com/api/docs/models/gpt-5.5 (accessed 2026-06-25)
family = "gpt"
release_date = "2026-04-23"
last_updated = "2026-04-30"
attachment = true
reasoning = true
reasoning_options = [{ type = "effort", values = ["none", "low", "medium", "high", "xhigh"] }]
temperature = false
tool_call = true
structured_output = true
knowledge = "2025-12-01"
open_weights = false

[cost]
input = 5.00
output = 30.00
cache_read = 0.50

[[cost.tiers]]
tier = { size = 272_000 }
input = 10.00
output = 45.00
cache_read = 1.00

[limit]
context = 1_000_000
output = 128_000

[modalities]
input = ["text", "image", "pdf"]
output = ["text"]
