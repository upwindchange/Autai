temperature = true
tool_call = true
structured_output = true

[extends]
from = "google/gemini-2.5-pro"
omit = ["cost.tiers", "cost.context_over_200k"]

[cost]
input = 1.25
output = 10
reasoning = 10
cache_read = 0.125
cache_write = 0.375

[limit]
context = 1_048_576
output = 65_536

[modalities]
input = ["text", "image", "pdf", "audio", "video"]
output = ["text"]
