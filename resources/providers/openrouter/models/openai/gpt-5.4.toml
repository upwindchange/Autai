temperature = false
tool_call = true
structured_output = true

[extends]
from = "openai/gpt-5.4"
omit = ["experimental", "cost.tiers", "cost.context_over_200k", "limit.input"]

[cost]
input = 2.5
output = 15
cache_read = 0.25

[limit]
context = 1_050_000
output = 128_000

[modalities]
input = ["text", "image", "pdf"]
output = ["text"]
