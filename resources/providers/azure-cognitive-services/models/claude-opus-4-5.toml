name = "Claude Opus 4.5"
family = "claude-opus"
release_date = "2025-11-24"
last_updated = "2025-08-01"
attachment = true
reasoning = true
# POST /anthropic/v1/messages accepts thinking.budget_tokens >=1024 and effort
# low/medium/high for this model; a raw budget must remain below max_tokens.
# https://docs.anthropic.com/en/docs/build-with-claude/extended-thinking
reasoning_options = [{ type = "effort", values = ["low", "medium", "high"] }, { type = "budget_tokens", min = 1_024 }]
temperature = true
tool_call = true
knowledge = "2025-03-31"
open_weights = false

[cost]
input = 5.00
output = 25.00
cache_read = 0.50
cache_write = 6.25

[limit]
context = 200_000
output = 64_000

[modalities]
input = ["text", "image", "pdf"]
output = ["text"]

[provider]
npm = "@ai-sdk/anthropic"
api = "https://${AZURE_COGNITIVE_SERVICES_RESOURCE_NAME}.services.ai.azure.com/anthropic/v1"
