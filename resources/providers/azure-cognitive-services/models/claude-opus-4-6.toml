name = "Claude Opus 4.6"
family = "claude-opus"
release_date = "2026-02-05"
last_updated = "2026-02-05"
attachment = true
reasoning = true
# POST /anthropic/v1/messages supports adaptive thinking with output_config.effort
# low/medium/high/max; manual thinking.budget_tokens is integer >=1024.
# https://docs.anthropic.com/en/docs/build-with-claude/adaptive-thinking
reasoning_options = [{ type = "effort", values = ["low", "medium", "high", "max"] }, { type = "budget_tokens", min = 1_024 }]
temperature = true
tool_call = true
knowledge = "2025-05-31"
open_weights = false

[cost]
input = 5.00
output = 25.00
cache_read = 0.50
cache_write = 6.25

[[cost.tiers]]
tier = { size = 200_000 }
input = 10.00
output = 37.50
cache_read = 1.00
cache_write = 12.50

[limit]
context = 200_000
output = 128_000

[modalities]
input = ["text", "image", "pdf"]
output = ["text"]

[provider]
npm = "@ai-sdk/anthropic"
api = "https://${AZURE_COGNITIVE_SERVICES_RESOURCE_NAME}.services.ai.azure.com/anthropic/v1"
