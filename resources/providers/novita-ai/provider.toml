name = "NovitaAI"
env = ["NOVITA_API_KEY"]
npm = "@ai-sdk/openai-compatible"
# Raw HTTP reasoning controls (sources accessed 2026-06-25):
# POST `/openai/v1/chat/completions` accepts top-level `enable_thinking =
# true|false` (default true), but documents it only for zai-org/glm-4.5 and
# deepseek/deepseek-v3.1, -v3.1-terminus, and -v3.2-exp. `separate_reasoning`
# is a distinct boolean documented only for deepseek/deepseek-r1-turbo.
# https://novita.ai/docs/api-reference/model-apis-llm-create-chat-completion
doc = "https://novita.ai/docs/guides/introduction"
api = "https://api.novita.ai/openai"
