# OpenAI POST /api/v1/chat/completions: `reasoning_effort`, or `reasoning`
# with `effort`, `max_tokens`, and `enabled`.
# Anthropic POST /api/anthropic/v1/messages: `thinking.type` enabled|disabled;
# enabled requires `budget_tokens >= 1024` and `< max_tokens`.
# Vertex POST /api/vertex-ai/v1/publishers/{provider}/models/{model}:generateContent:
# `generationConfig.thinkingConfig` uses `thinkingBudget` or `thinkingLevel`.
# https://docs.zenmux.ai/guide/advanced/reasoning.html (accessed 2026-06-25)
name = "ZenMux"
env = ["ZENMUX_API_KEY"]
npm = "@ai-sdk/openai-compatible"
api = "https://zenmux.ai/api/v1"
doc = "https://docs.zenmux.ai"
