name = "Cohere"
env = ["COHERE_API_KEY"]
npm = "@ai-sdk/cohere"
# Reasoning HTTP format (accessed 2026-06-25):
# Native Chat: POST https://api.cohere.com/v2/chat. Toggle:
# thinking.type = "enabled"|"disabled". Budget: thinking.token_budget = a
# positive integer. Effort is not documented on this request surface.
# OpenAI Chat: POST https://api.cohere.ai/compatibility/v1/chat/completions.
# reasoning_effort = "none"|"high" maps to disabled|enabled thinking;
# token budget is not documented on this request surface.
# Sources:
# https://docs.cohere.com/reference/chat
# https://docs.cohere.com/docs/reasoning
# https://docs.cohere.com/docs/compatibility-api
doc = "https://docs.cohere.com/docs/models"
