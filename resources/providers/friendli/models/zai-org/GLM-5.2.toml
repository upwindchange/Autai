name = "GLM-5.2"
# Friendli documents only $.chat_template_kwargs.enable_thinking = true | false
# for this model, not the configured effort values "high" and "max".
# https://friendli.ai/docs/guides/reasoning (accessed 2026-06-25)
base_model = "zhipuai/glm-5.2"

[[reasoning_options]]
type = "effort"
values = ["high", "max"]

[interleaved]
field = "reasoning_content"

[cost]
input = 1.4
output = 4.4
cache_read = 0.26