name = "Llama 3.3 70B Instruct"
# POST .../endpoints/openapi/chat/completions with model, messages, max_tokens,
# stream, and extra_body.google.model_safety_settings; no reasoning control documented.
# https://cloud.google.com/vertex-ai/generative-ai/docs/partner-models/llama/use-llama (accessed 2026-06-25)
family = "llama"
release_date = "2025-04-29"
last_updated = "2025-04-29"
attachment = false
reasoning = false
temperature = true
tool_call = true
structured_output = true
