name = "Kimi K2 Thinking"
# POST .../endpoints/openapi/chat/completions; this is always-thinking, and
# Vertex documents no toggle, effort, or budget request field for it.
# https://cloud.google.com/vertex-ai/generative-ai/docs/maas/capabilities/thinking (accessed 2026-06-25)
family = "kimi-thinking"
release_date = "2025-11-13"
last_updated = "2025-11-13"
attachment = false
reasoning = true
reasoning_options = []
temperature = true
tool_call = true
structured_output = true
knowledge = "2024-08"
open_weights = true

[interleaved]
field = "reasoning_content"

[cost]
input = 0.60
output = 2.50

[limit]
context = 262_144
output = 262_144

[modalities]
input = ["text"]
output = ["text"]

[provider]
npm = "@ai-sdk/openai-compatible"
api = "https://${GOOGLE_VERTEX_ENDPOINT}/v1/projects/${GOOGLE_VERTEX_PROJECT}/locations/${GOOGLE_VERTEX_LOCATION}/endpoints/openapi"
