name = "GLM-4.7"
# POST .../endpoints/openapi/chat/completions; toggle with
# $.chat_template_kwargs.enable_thinking = true | false.
# https://cloud.google.com/vertex-ai/generative-ai/docs/maas/capabilities/thinking (accessed 2026-06-25)
family = "glm"
release_date = "2026-01-06"
last_updated = "2026-01-06"
attachment = false
reasoning = true
reasoning_options = [{ type = "toggle" }]
temperature = true
tool_call = true
structured_output = true
knowledge = "2025-04"
open_weights = true

[interleaved]
field = "reasoning_content"

[cost]
input = 0.60
output = 2.20

[limit]
context = 200_000
output = 128_000

[modalities]
input = ["text", "pdf"]
output = ["text"]

[provider]
npm = "@ai-sdk/openai-compatible"
api = "https://${GOOGLE_VERTEX_ENDPOINT}/v1/projects/${GOOGLE_VERTEX_PROJECT}/locations/${GOOGLE_VERTEX_LOCATION}/endpoints/openapi"
