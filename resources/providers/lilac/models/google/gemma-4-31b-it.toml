# $.chat_template_kwargs.enable_thinking = true|false; default false. The
# template ignores $.chat_template_kwargs.thinking when sent alone.
# https://docs.getlilac.com/inference/chat-completions#reasoning (accessed 2026-06-25)
reasoning_options = [{ type = "toggle" }]
base_model = "google/gemma-4-31b-it"
knowledge = "2025-01"

[interleaved]
field = "reasoning_content"

[cost]
input = 0.11
output = 0.35

[limit]
context = 262_100
output = 262_100

[modalities]
input = ["text", "image", "video"]
