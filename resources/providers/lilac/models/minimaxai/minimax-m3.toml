# $.chat_template_kwargs.thinking_mode = "adaptive"|"enabled"|"disabled";
# adaptive is the default, enabled always thinks, and disabled never thinks.
# https://docs.getlilac.com/inference/chat-completions#reasoning (accessed 2026-06-25)
base_model = "minimax/MiniMax-M3"
name = "MiniMax M3"
family = "minimax-m3"
reasoning_options = [{ type = "toggle" }]
structured_output = true

[cost]
input = 0.28
output = 1.1
cache_read = 0.05

[limit]
context = 1_048_576
output = 1_048_576

[modalities]
input = ["text", "image", "video"]
output = ["text"]
