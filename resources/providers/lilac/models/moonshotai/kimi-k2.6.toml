# $.chat_template_kwargs.thinking = true|false; default true. The similarly
# named enable_thinking key is ignored by this Moonshot template.
# https://docs.getlilac.com/inference/chat-completions#reasoning (accessed 2026-06-25)
reasoning_options = [{ type = "toggle" }]
