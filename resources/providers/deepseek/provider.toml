name = "DeepSeek"
env = ["DEEPSEEK_API_KEY"]
npm = "@ai-sdk/openai-compatible"
# OpenAI Chat is POST `/chat/completions`: `thinking.type = enabled|disabled`
# and `reasoning_effort = high|max`; low/medium map to high and xhigh to max.
# Anthropic Messages is POST `/anthropic/v1/messages`: `thinking.type` and
# `output_config.effort = high|max`; `thinking.budget_tokens` is ignored.
# https://api-docs.deepseek.com/guides/thinking_mode (accessed 2026-06-25)
# https://api-docs.deepseek.com/guides/anthropic_api (accessed 2026-06-25)
doc = "https://api-docs.deepseek.com/quick_start/pricing"
api = "https://api.deepseek.com"
