name = "Cortecs"
env = ["CORTECS_API_KEY"]
npm = "@ai-sdk/openai-compatible"
# Raw HTTP is POST `/v1/chat/completions`. Cortecs maps OpenAI
# `reasoning_effort` to backend controls: Claude `output_config.effort` and
# `thinking.budget_tokens`, Kimi `thinking.type`, and GPT/DeepSeek effort.
# Compatibility fields unsupported by a selected backend can be silently
# ignored, so only model-specific controls cited in model comments are usable.
# https://api.cortecs.ai/v1/models (accessed 2026-06-25)
api = "https://api.cortecs.ai/v1"
doc = "https://api.cortecs.ai/v1/models"