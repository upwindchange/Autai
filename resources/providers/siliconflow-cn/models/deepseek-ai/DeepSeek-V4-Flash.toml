base_model = "deepseek/deepseek-v4-flash"
# thinking_budget = 128..32768. This model alone also accepts
# reasoning_effort = "high"|"max"; low|medium map to high and xhigh maps to
# max (accessed 2026-06-25).
# https://docs.siliconflow.cn/cn/api-reference/chat-completions/chat-completions
reasoning_options = [{ type = "budget_tokens", min = 128, max = 32_768 }]

[interleaved]
field = "reasoning_content"

[cost]
input = 0.14
output = 0.28
cache_read = 0.003
