name = "Sarvam AI"
env = ["SARVAM_API_KEY"]
npm = "@ai-sdk/openai-compatible"
# Reasoning HTTP format (accessed 2026-06-25):
# POST https://api.sarvam.ai/v1/chat/completions accepts top-level
# reasoning_effort = "low"|"medium"|"high" (default "medium"). JSON null,
# not the string "null", disables reasoning for sarvam-30b and sarvam-105b.
# Sources:
# https://docs.sarvam.ai/api-reference-docs/chat/chat-completions
# https://docs.sarvam.ai/api-reference-docs/api-guides-tutorials/chat-completion/how-to/adjust-the-models-thinking-level
doc = "https://docs.sarvam.ai/api-reference-docs/getting-started/models"
api = "https://api.sarvam.ai/v1"
