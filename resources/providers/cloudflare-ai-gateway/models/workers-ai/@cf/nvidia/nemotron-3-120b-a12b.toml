# Raw Workers AI input uses `reasoning_effort = low|medium|high` and
# `chat_template_kwargs.enable_thinking = true|false`.
# https://developers.cloudflare.com/workers-ai/models/nemotron-3-120b-a12b/sync-input.json (accessed 2026-06-25)
name = "Nemotron 3 Super 120B"
base_model = "nvidia/nemotron-3-super-120b-a12b"
family = "nemotron"
release_date = "2026-03-11"
last_updated = "2026-03-11"
attachment = false
reasoning = true
reasoning_options = [{ type = "toggle" }, { type = "effort", values = ["low", "medium", "high"] }]
temperature = true
tool_call = true
open_weights = true

[interleaved]
field = "reasoning_content"

[cost]
input = 0.50
output = 1.50

[limit]
context = 256_000
output = 256_000

[modalities]
input = ["text"]
output = ["text"]
