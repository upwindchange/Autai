# Raw Workers AI input uses `reasoning_effort = low|medium|high` and
# `chat_template_kwargs.enable_thinking = true|false`.
# https://developers.cloudflare.com/workers-ai/models/kimi-k2.5/sync-input.json (accessed 2026-06-25)
name = "Kimi K2.5"
family = "kimi-k2"
release_date = "2026-01-27"
last_updated = "2026-01-27"
attachment = true
reasoning = true
reasoning_options = [{ type = "toggle" }, { type = "effort", values = ["low", "medium", "high"] }]
structured_output = true
temperature = true
tool_call = true
knowledge = "2025-01"
open_weights = true

[interleaved]
field = "reasoning_content"

[cost]
input = 0.60
output = 3.00
cache_read = 0.10

[limit]
context = 256_000
output = 256_000

[modalities]
input = ["text", "image"]
output = ["text"]
