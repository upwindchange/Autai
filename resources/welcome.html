<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autai</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: hsl(0 0% 96% / 0.3);
      color: hsl(0 0% 45%);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      margin-bottom: 1.5rem;
    }

    .title {
      font-size: 2.25rem;
      font-weight: 700;
      color: hsl(0 0% 9%);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.125rem;
      color: hsl(0 0% 45%);
    }

    .description {
      max-width: 42rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: hsl(0 0% 45%);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 48rem;
      margin-bottom: 2rem;
    }

    .feature-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      border-radius: 0.5rem;
      background: hsl(0 0% 100% / 0.5);
      border: 1px solid hsl(0 0% 89% / 0.5);
    }

    .feature-icon {
      width: 2rem;
      height: 2rem;
      margin-bottom: 0.5rem;
    }

    .feature-title {
      font-weight: 500;
      color: hsl(0 0% 9%);
      margin-bottom: 0.25rem;
    }

    .feature-desc {
      font-size: 0.875rem;
      color: hsl(0 0% 45%);
    }

    .suggestion {
      font-size: 0.875rem;
      color: hsl(0 0% 45%);
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">{{title}}</div>
      <div class="subtitle">{{subtitle}}</div>
    </div>

    <p class="description">{{description}}</p>

    <div class="features">
      <div class="feature-card">
        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <div class="feature-title">{{feature.browse.title}}</div>
        <div class="feature-desc">{{feature.browse.description}}</div>
      </div>
      <div class="feature-card">
        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
          <path d="m15 5 4 4"/>
        </svg>
        <div class="feature-title">{{feature.automate.title}}</div>
        <div class="feature-desc">{{feature.automate.description}}</div>
      </div>
      <div class="feature-card">
        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <div class="feature-title">{{feature.extract.title}}</div>
        <div class="feature-desc">{{feature.extract.description}}</div>
      </div>
    </div>

    <p class="suggestion">{{prompt.suggestion}}</p>
  </div>
</body>
</html>
